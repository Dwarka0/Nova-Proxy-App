name: Build NovaProxy EXE

on:
  workflow_dispatch:   # این خط باعث می‌شود بتوانید دستی اجرایش کنید

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'   # نسخه‌ای که پروژه نیاز دارد

      - name: Build
        shell: cmd
        run: |
          go env -w GOPROXY=https://goproxy.cn,direct
          go build -ldflags="-s -w" -o NovaProxy.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaProxy-Windows
          path: NovaProxy.exe
