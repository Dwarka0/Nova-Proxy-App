name: Build NovaProxy EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'

      - name: Remove problematic replace directives
        shell: pwsh
        run: |
          (Get-Content go.mod) | Where-Object { 
            $_ -notmatch 'replace github.com/wailsapp/wails/v3' -and 
            $_ -notmatch 'replace github.com/refraction-networking/utls' 
          } | Set-Content go.mod

      - name: Build
        shell: cmd
        run: |
          go env -w GOPROXY=https://goproxy.cn,direct
          go build -ldflags="-s -w" -o NovaProxy.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaProxy-Windows
          path: NovaProxy.exe
